# Netlify configuration for Southern Barn Builders LLC
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Static site — no build step. Publish the repo root as-is.
  publish = "."

# Clean URLs: /services instead of /services.html
[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301
  force = false

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
