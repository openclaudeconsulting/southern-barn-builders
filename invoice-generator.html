<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoicer Pro — GNP Steel Trusses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ---------- Tokens (GNP Steel Trusses — navy + amber) ---------- */
:root {
  --pc-navy: #14304f;
  --pc-navy-dark: #0c1e33;
  --pc-navy-light: #26456f;
  --pc-blue: #3d6bb4;
  --pc-blue-dark: #2a5390;
  --pc-blue-light: #6d93c9;
  --pc-sky: #b8d0ec;
  --pc-sky-soft: #eaf1fa;

  --pc-amber: #e9a23b;
  --pc-amber-dark: #c77d1f;
  --pc-amber-light: #f5c97e;
  --pc-amber-soft: #fce8c7;
  --pc-copper: #b86a2f;

  --pc-cream: #fbf6ec;
  --pc-parchment: #f4ebd6;
  --pc-offwhite: #fbf8f2;

  --pc-ink: #1a2030;
  --pc-muted: #556175;
  --pc-border: #e8e1d1;
  --pc-border-cool: #dbe2ec;
  --pc-surface: #ffffff;

  /* Legacy aliases — keep names that the rest of the stylesheet references */
  --sb-red: var(--pc-amber-dark);      /* warm accent (brand mark bg) */
  --sb-red-dark: var(--pc-copper);
  --sb-green: var(--pc-blue);
  --sb-green-dark: var(--pc-navy);     /* primary dark panels (header + footer strip) */
  --sb-gold: var(--pc-amber);          /* amber highlight — QUOTE/INVOICE title, accent bar */
  --sb-cream: var(--pc-cream);
  --sb-parchment: var(--pc-offwhite);
  --sb-ink: var(--pc-ink);
  --sb-muted: var(--pc-muted);
  --sb-border: var(--pc-border);
  --sb-surface: var(--pc-surface);

  --font-serif: "Montserrat", "Helvetica Neue", Arial, sans-serif;
  --font-body: "Inter", "Helvetica Neue", Arial, sans-serif;
}

/* ---------- Reset ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: #eaf1fa;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  color: var(--sb-ink);
}

/* ---------- App Layout ---------- */
.app-wrapper {
  display: grid;
  grid-template-columns: 380px 1fr;
  min-height: 100vh;
}

/* ---------- Sidebar (Form) ---------- */
.sidebar {
  background: var(--sb-green-dark);
  color: #e0ddd4;
  padding: 28px 24px;
  overflow-y: auto;
  max-height: 100vh;
  position: sticky;
  top: 0;
}
.sidebar h1 {
  font-family: var(--font-serif);
  font-size: 20px;
  color: var(--sb-gold);
  margin-bottom: 4px;
}
.sidebar .subtitle {
  font-size: 12px;
  color: #a09880;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.sidebar h2 {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--sb-gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 24px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(201,162,39,0.25);
}
.sidebar h2:first-of-type { margin-top: 0; }

.field { margin-bottom: 12px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #b0a890;
  margin-bottom: 4px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  background: rgba(255,255,255,0.07);
  color: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: var(--sb-gold);
}
.field textarea { resize: vertical; min-height: 60px; }
.field select option { background: var(--sb-green-dark); color: #fff; }
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.field-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

/* Line items */
.line-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}
.line-item .field-row-desc {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.line-item .field-row-nums {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.remove-item {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: none;
  color: #8a6060;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.15s;
}
.remove-item:hover { color: #ff6b6b; background: rgba(255,0,0,0.1); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-add {
  background: rgba(201,162,39,0.15);
  color: var(--sb-gold);
  border: 1px dashed rgba(201,162,39,0.4);
  width: 100%;
  justify-content: center;
  margin-top: 4px;
}
.btn-add:hover { background: rgba(201,162,39,0.25); }

.btn-print {
  background: var(--sb-gold);
  color: var(--sb-green-dark);
  width: 100%;
  justify-content: center;
  padding: 12px 20px;
  font-size: 15px;
  margin-top: 24px;
  border-radius: 6px;
}
.btn-print:hover { background: #d4ad2e; }

.deposit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}
.deposit-row label {
  font-size: 13px;
  color: #c0b89a;
  font-weight: 500;
  white-space: nowrap;
}
.deposit-row input {
  width: 70px;
  text-align: center;
}

/* ---------- Invoice Preview ---------- */
.preview-area {
  background: #c4bba8;
  padding: 40px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-y: auto;
}

.invoice {
  background: #fff;
  width: 100%;
  max-width: 800px;
  min-height: 1000px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.15);
  padding: 0;
  font-size: 14px;
  position: relative;
  display: flex;
  flex-direction: column;
}
.inv-bottom-strip {
  margin-top: auto;
}

/* Invoice header bar */
.inv-header {
  background: linear-gradient(135deg, var(--pc-navy-dark) 0%, var(--pc-navy) 55%, var(--pc-blue-dark) 100%);
  color: #fff;
  padding: 32px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.inv-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}
.inv-brand-logo {
  height: 96px;
  width: auto;
  display: block;
  border-radius: 8px;
  background: #fbf6ec;
  padding: 6px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
  flex-shrink: 0;
}
.inv-brand-text h2 {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  margin: 0;
  line-height: 1.2;
}
.inv-brand-text p {
  font-size: 11px;
  color: var(--sb-gold);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.inv-title {
  text-align: right;
}
.inv-title h1 {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  color: var(--sb-gold);
  line-height: 1;
  margin-bottom: 4px;
  /* Hairline black outline + barely-there drop shadow.
     paint-order ensures the stroke sits OUTSIDE the fill so the letters
     don't look thinned out. Chrome headless honors both rules in PDF. */
  -webkit-text-stroke: 0.5px #000;
  paint-order: stroke fill;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.22);
}
.inv-title p {
  font-size: 13px;
  color: var(--pc-sky);
}

/* Amber accent bar (matches site hero accent) */
.inv-accent {
  height: 4px;
  background: linear-gradient(90deg, var(--pc-amber-light) 0%, var(--pc-amber) 50%, var(--pc-copper) 100%);
}

/* Info section */
.inv-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  padding: 28px 40px;
}
.inv-info-block h3 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sb-muted);
  margin-bottom: 8px;
}
.inv-info-block p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--sb-ink);
}
.inv-info-block .detail-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 13px;
}
.inv-info-block .detail-row .label {
  color: var(--sb-muted);
  font-weight: 500;
}
.inv-info-block .detail-row .value {
  font-weight: 600;
  color: var(--sb-ink);
}

/* Divider */
.inv-divider {
  margin: 0 40px;
  border: none;
  border-top: 1px solid #e5dfd0;
}

/* Table */
.inv-table-wrap {
  padding: 24px 40px;
}
.inv-table {
  width: 100%;
  border-collapse: collapse;
}
.inv-table thead th {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sb-muted);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--sb-green-dark);
}
.inv-table thead th:nth-child(2),
.inv-table thead th:nth-child(3),
.inv-table thead th:nth-child(4) { text-align: right; }
.inv-table tbody td {
  padding: 14px 12px;
  border-bottom: 1px solid #f0ebe0;
  font-size: 14px;
}
.inv-table tbody td:nth-child(2),
.inv-table tbody td:nth-child(3),
.inv-table tbody td:nth-child(4) { text-align: right; }
.inv-table tbody tr:last-child td { border-bottom: 2px solid var(--sb-green-dark); }

/* Totals */
.inv-totals {
  display: flex;
  justify-content: flex-end;
}
.inv-totals-table {
  width: 100%;
}
.inv-totals-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 14px;
}
.inv-totals-row .label { color: var(--sb-muted); }
.inv-totals-row .value { font-weight: 600; }
.inv-totals-row.deposit {
  padding: 10px 0;
  margin-top: 6px;
  border-top: 1px solid #e5dfd0;
}
.inv-totals-row.deposit .label {
  font-weight: 700;
  color: var(--sb-red);
}
.inv-totals-row.deposit .value {
  font-weight: 700;
  color: var(--sb-red);
  font-size: 18px;
}
.inv-totals-row.balance {
  font-size: 12px;
  color: var(--sb-muted);
}

/* Spec block */
.inv-specs {
  margin: 0 40px;
  padding: 16px 20px;
  background: #faf8f2;
  border: 1px solid #e8e2d2;
  border-radius: 6px;
}
.inv-specs h3 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sb-green-dark);
  margin-bottom: 8px;
}
.inv-specs ul {
  list-style: none;
  padding: 0;
  margin: 0;
  columns: 1;
}
.inv-specs li {
  font-size: 12px;
  color: var(--sb-muted);
  padding: 2px 0;
  line-height: 1.5;
}
.inv-specs li::before {
  content: "\2713";
  color: var(--sb-green);
  font-weight: 700;
  margin-right: 8px;
}
.inv-specs .spec-note {
  font-size: 11px;
  color: var(--sb-red);
  margin-top: 8px;
  font-weight: 600;
  font-style: italic;
}

/* Notes & Totals side-by-side layout */
.inv-notes-totals {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
  padding: 20px 40px 16px;
  align-items: start;
}

/* Notes / Terms */
.inv-footer {
  padding: 0;
}
.inv-footer h3 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--sb-muted);
  margin-bottom: 6px;
}
.inv-footer p {
  font-size: 11px;
  line-height: 1.6;
  color: var(--sb-muted);
  white-space: pre-wrap;
}

/* Company footer strip */
.inv-bottom-strip {
  background: linear-gradient(135deg, var(--pc-navy-dark) 0%, var(--pc-navy) 60%, var(--pc-blue-dark) 100%);
  color: var(--pc-sky);
  padding: 14px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
.inv-bottom-strip a {
  color: var(--sb-gold);
  text-decoration: none;
}

/* ---------- Print Styles ---------- */
@media print {
  @page {
    size: letter;
    margin: 0;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: auto;
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .sidebar { display: none !important; }
  .app-wrapper {
    display: block;
    min-height: 0;
  }
  .preview-area {
    background: none;
    padding: 0;
    display: block;
    overflow: visible;
    min-height: 0;
  }
  /* Use position:absolute to pin the footer to the bottom of a fixed-
     size container. More reliable than flex for print, since any
     extra pixel overhead would otherwise push the footer to page 2. */
  .invoice {
    box-shadow: none;
    width: 100%;
    max-width: none;
    min-height: 10in;
    position: relative;
    padding-bottom: 48px;
    display: block;
    page-break-after: avoid;
    break-after: avoid;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .inv-bottom-strip {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
  }
  .inv-header, .inv-accent, .inv-bottom-strip {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .inv-header { padding: 24px 36px; }
  .inv-info { padding: 20px 36px; }
  .inv-divider { margin: 0 36px; }
  .inv-table-wrap { padding: 16px 36px; }
  .inv-specs { margin: 0 36px; padding: 12px 16px; }
  .inv-notes-totals { padding: 16px 36px 12px; }
  .inv-bottom-strip { padding: 10px 36px; }
  .inv-table tbody td { padding: 10px 12px; }
  .inv-specs li { font-size: 11px; }
}

/* ---------- Responsive ---------- */
@media (max-width: 900px) {
  .app-wrapper {
    grid-template-columns: 1fr;
  }
  .sidebar {
    position: static;
    max-height: none;
  }
  .preview-area {
    padding: 20px;
  }
}
</style>
</head>
<body>

<div class="app-wrapper">
  <!-- ===== SIDEBAR FORM ===== -->
  <div class="sidebar">
    <h1>Invoicer Pro</h1>
    <p class="subtitle">GNP Steel Trusses</p>

    <h2>Invoice Details</h2>
    <div class="field-row">
      <div class="field">
        <label>Invoice #</label>
        <input type="text" id="invoiceNum" value="SBB-001" oninput="render()" />
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="invoiceDate" oninput="render()" />
      </div>
    </div>
    <div class="field">
      <label>Due Date</label>
      <input type="date" id="dueDate" oninput="render()" />
    </div>

    <h2>Bill To</h2>
    <div class="field">
      <label>Customer Name</label>
      <input type="text" id="custName" value="Jordan Williams" oninput="render()" />
    </div>
    <div class="field">
      <label>Company (optional)</label>
      <input type="text" id="custCompany" placeholder="" oninput="render()" />
    </div>
    <div class="field">
      <label>Address</label>
      <input type="text" id="custAddr1" placeholder="Street Address" oninput="render()" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>City</label>
        <input type="text" id="custCity" value="Lake Butler" oninput="render()" />
      </div>
      <div class="field">
        <label>State / ZIP</label>
        <input type="text" id="custStateZip" value="FL 32054" oninput="render()" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Phone</label>
        <input type="text" id="custPhone" placeholder="" oninput="render()" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="text" id="custEmail" value="Jkw4flgators@gmail.com" oninput="render()" />
      </div>
    </div>

    <h2>Line Items</h2>
    <div id="lineItems"></div>
    <button class="btn btn-add" onclick="addItem()">+ Add Line Item</button>

    <h2>Payment</h2>
    <div class="deposit-row">
      <label>Deposit Required:</label>
      <input type="number" id="depositPct" value="50" min="0" max="100" oninput="render()" />
      <label>%</label>
    </div>
    <div class="deposit-row" style="margin-top:8px">
      <label>Sales Tax Rate:</label>
      <input type="number" id="taxRate" value="0" min="0" max="20" step="0.1" oninput="render()" />
      <label>%</label>
    </div>

    <h2>Notes &amp; Terms</h2>
    <div class="field">
      <textarea id="invoiceNotes" rows="6" oninput="render()">50% deposit is due upon receipt of this invoice. The deposit secures your project slot and allows us to begin material procurement and scheduling. Concrete and rebar are not included unless listed as a line item.

Balance is due upon project completion. We accept check, cash, Zelle, or bank transfer.

This price includes all pole barn kit materials, all taxes on materials, and installation. Thank you for choosing GNP Steel Trusses.</textarea>
    </div>

    <button class="btn btn-print" onclick="downloadPdf()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download as PDF
    </button>
    <button class="btn btn-print" style="margin-top:10px;background:transparent;color:var(--sb-gold);border:1px solid rgba(201,162,39,0.5);" onclick="window.print()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print (Browser Dialog)
    </button>
  </div>

  <!-- ===== INVOICE PREVIEW ===== -->
  <div class="preview-area">
    <div class="invoice" id="invoicePreview"></div>
  </div>
</div>

<script>
// ---------- State ----------
let items = [
  { desc: '40x60x12 Pole Barn Kit — Complete Materials Package', qty: 1, price: 9000 },
  { desc: 'Delivery & Installation — Lake Butler, FL', qty: 1, price: 5500 }
];

// ---------- Init ----------
(function init() {
  const today = new Date();
  document.getElementById('invoiceDate').value = fmt(today);
  const due = new Date(today);
  due.setDate(due.getDate() + 14);
  document.getElementById('dueDate').value = fmt(due);

  // Read URL params to pre-fill the form (for headless PDF generation)
  const params = new URLSearchParams(location.search);
  const set = (id, key) => {
    if (params.has(key)) document.getElementById(id).value = params.get(key);
  };
  set('invoiceNum', 'num');
  set('invoiceDate', 'date');
  set('dueDate', 'due');
  set('custName', 'name');
  set('custCompany', 'company');
  set('custAddr1', 'addr');
  set('custCity', 'city');
  set('custStateZip', 'state');
  set('custPhone', 'phone');
  set('custEmail', 'email');
  set('depositPct', 'deposit');
  set('taxRate', 'tax');
  if (params.has('notes')) document.getElementById('invoiceNotes').value = params.get('notes');

  if (params.has('items')) {
    try {
      const parsed = JSON.parse(params.get('items'));
      if (Array.isArray(parsed) && parsed.length) items = parsed;
    } catch (e) { console.error('bad items param:', e); }
  }

  renderItems();
  render();

  // Auto-trigger PDF download when ?autopdf=1 is set
  if (params.get('autopdf') === '1') {
    setTimeout(() => downloadPdf(), 400);
  }
})();

function fmt(d) {
  return d.toISOString().split('T')[0];
}

// ---------- Line items ----------
function renderItems() {
  const c = document.getElementById('lineItems');
  c.innerHTML = '';
  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'line-item';
    el.innerHTML = `
      <button class="remove-item" onclick="removeItem(${i})" title="Remove">&times;</button>
      <div class="field-row-desc">
        <div class="field">
          <label>Description</label>
          <input type="text" value="${esc(item.desc)}" oninput="items[${i}].desc=this.value;render()" />
        </div>
      </div>
      <div class="field-row-nums">
        <div class="field">
          <label>Qty</label>
          <input type="number" value="${item.qty}" min="1" oninput="items[${i}].qty=parseFloat(this.value)||0;render()" />
        </div>
        <div class="field">
          <label>Unit Price</label>
          <input type="number" value="${item.price}" min="0" step="0.01" oninput="items[${i}].price=parseFloat(this.value)||0;render()" />
        </div>
        <div class="field">
          <label>Total</label>
          <input type="text" value="${money(item.qty * item.price)}" readonly style="opacity:0.6" />
        </div>
      </div>
    `;
    c.appendChild(el);
  });
}

function addItem() {
  items.push({ desc: '', qty: 1, price: 0 });
  renderItems();
  render();
}

function removeItem(i) {
  if (items.length <= 1) return;
  items.splice(i, 1);
  renderItems();
  render();
}

// ---------- Helpers ----------
function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function money(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function formatDate(val) {
  if (!val) return '—';
  const [y, m, d] = val.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

// ---------- Render Invoice ----------
function render() {
  const num = document.getElementById('invoiceNum').value || 'SBB-001';
  const date = document.getElementById('invoiceDate').value;
  const due = document.getElementById('dueDate').value;
  const name = document.getElementById('custName').value;
  const company = document.getElementById('custCompany').value;
  const addr = document.getElementById('custAddr1').value;
  const city = document.getElementById('custCity').value;
  const stateZip = document.getElementById('custStateZip').value;
  const phone = document.getElementById('custPhone').value;
  const email = document.getElementById('custEmail').value;
  const notes = document.getElementById('invoiceNotes').value;
  const depPct = parseFloat(document.getElementById('depositPct').value) || 0;
  const taxRatePct = parseFloat(document.getElementById('taxRate').value) || 0;

  const subtotal = items.reduce((s, it) => s + (it.qty * it.price), 0);
  const deposit = subtotal * (depPct / 100);
  const taxOnDeposit = deposit * (taxRatePct / 100);
  const amountDueNow = deposit + taxOnDeposit;
  const balanceBeforeTax = subtotal - deposit;
  const taxOnBalance = balanceBeforeTax * (taxRatePct / 100);
  const balanceDue = balanceBeforeTax + taxOnBalance;

  const cityLine = [city, stateZip].filter(Boolean).join(', ');
  const custLines = [
    name || '<span style="color:#bbb">Customer Name</span>',
    company,
    addr,
    cityLine,
    phone ? 'Phone: ' + phone : '',
    email ? 'Email: ' + email : ''
  ].filter(Boolean).join('<br/>');

  let tableRows = '';
  items.forEach(it => {
    const total = it.qty * it.price;
    const discBadge = (it.discount && it.discount > 0)
      ? `<div style="color:var(--sb-red);font-size:11px;font-weight:600;margin-top:3px;letter-spacing:0.3px;">Bulk Price Discount ${it.discount}%</div>`
      : '';
    tableRows += `
      <tr>
        <td>${it.desc || '—'}${discBadge}</td>
        <td>${it.qty}</td>
        <td>${money(it.price)}</td>
        <td>${money(total)}</td>
      </tr>`;
  });

  document.getElementById('invoicePreview').innerHTML = `
    <div class="inv-header">
      <div class="inv-brand">
        <img class="inv-brand-logo" src="images/logo-gnp.png" alt="GNP Steel Trusses — Commercial &amp; Residential" />
      </div>
      <div class="inv-title">
        <h1>${/(^|[-_])Q[-_]?/i.test(num) ? 'QUOTE' : 'INVOICE'}</h1>
        <p>${num}</p>
      </div>
    </div>
    <div class="inv-accent"></div>

    <div class="inv-info">
      <div class="inv-info-block">
        <h3>Bill To</h3>
        <p>${custLines}</p>
      </div>
      <div class="inv-info-block">
        <h3>Invoice Details</h3>
        <div class="detail-row">
          <span class="label">Invoice Number</span>
          <span class="value">${num}</span>
        </div>
        <div class="detail-row">
          <span class="label">Issue Date</span>
          <span class="value">${formatDate(date)}</span>
        </div>
        <div class="detail-row">
          <span class="label">Due Date</span>
          <span class="value">${formatDate(due)}</span>
        </div>
        <div class="detail-row">
          <span class="label">Payment Terms</span>
          <span class="value">${depPct}% Deposit Due</span>
        </div>
      </div>
    </div>

    <hr class="inv-divider" />

    <div class="inv-table-wrap">
      <table class="inv-table">
        <thead>
          <tr>
            <th>Description</th>
            <th>Qty</th>
            <th>Unit Price</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
        </tbody>
      </table>
    </div>

    <div class="inv-specs">
      <h3>Kit Specifications${(items[0] && items[0].desc.match(/\d+\s*[xX]\s*\d+\s*[xX]\s*\d+/)) ? ' — ' + items[0].desc.match(/\d+\s*[xX]\s*\d+\s*[xX]\s*\d+/)[0] + ' Pole Barn' : ''}</h3>
      <ul>
        <li>8x8 marine grade treated posts (trusses thru-bolted, not lag bolted)</li>
        <li>2x6 purlins — #2 grade lumber</li>
        <li>29 gauge metal roofing &amp; siding (upgradeable to 26 gauge; color options available)</li>
        <li>2" angle iron steel trusses — rated for 150 mph winds</li>
        <li>All materials, taxes on materials, and installation included</li>
      </ul>
      <p class="spec-note">* Concrete and rebar are not included unless listed as a line item above.</p>
    </div>

    <div class="inv-notes-totals">
      <div class="inv-footer">
        <h3>Notes &amp; Terms</h3>
        <p>${notes.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
      </div>
      <div class="inv-totals">
        <div class="inv-totals-table">
          <div class="inv-totals-row">
            <span class="label">Subtotal</span>
            <span class="value">${money(subtotal)}</span>
          </div>
          <div class="inv-totals-row">
            <span class="label">Deposit (${depPct}%)</span>
            <span class="value">${money(deposit)}</span>
          </div>
          ${taxRatePct > 0 ? `<div class="inv-totals-row">
            <span class="label">Sales Tax (${taxRatePct}%)</span>
            <span class="value">${money(taxOnDeposit)}</span>
          </div>` : ''}
          <div class="inv-totals-row deposit">
            <span class="label">Total Due Now</span>
            <span class="value">${money(amountDueNow)}</span>
          </div>
          <div class="inv-totals-row balance">
            <span class="label">Balance at completion</span>
            <span class="value">${money(balanceDue)}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="inv-bottom-strip">
      <span>GNP Steel Trusses &nbsp;&bull;&nbsp; Licensed &amp; Insured &nbsp;&bull;&nbsp; Commercial &amp; Residential</span>
      <span>(352) 646-9090 &nbsp;&bull;&nbsp; <a href="mailto:Southern.Barn.Services@gmail.com">Southern.Barn.Services@gmail.com</a></span>
    </div>
  `;
}

// ---------- PDF Download ----------
function downloadPdf() {
  const el = document.getElementById('invoicePreview');
  const custName = (document.getElementById('custName').value || 'Customer').trim();
  const num = document.getElementById('invoiceNum').value || '';
  const isQuote = /(^|[-_])Q[-_]?/i.test(num);
  const prefix = isQuote ? 'QUOTE' : 'INVOICE';

  // Try to pick up the size from the first line item (e.g., 40x56x16)
  const sizeMatch = (items[0] && items[0].desc.match(/\d+\s*[xX]\s*\d+\s*[xX]\s*\d+/)) || null;
  const sizeTag = sizeMatch ? ' ' + sizeMatch[0].replace(/\s+/g, '') : '';

  const filename = `${prefix} ${custName}${sizeTag}.pdf`;

  // Clone and strip the on-screen box-shadow so the PDF is clean
  const clone = el.cloneNode(true);
  clone.style.boxShadow = 'none';
  clone.style.margin = '0';
  clone.style.width = '8.5in';
  clone.style.minHeight = '10.9in';
  clone.style.position = 'relative';

  // Keep the footer pinned to the bottom in the clone
  const strip = clone.querySelector('.inv-bottom-strip');
  if (strip) {
    strip.style.position = 'absolute';
    strip.style.left = '0';
    strip.style.right = '0';
    strip.style.bottom = '0';
  }

  const opt = {
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all'] }
  };

  html2pdf().set(opt).from(clone).save();
}
</script>
